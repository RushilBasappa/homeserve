# ansible.cfg — configuration for the provisioning playbook.
#
# Auto-loaded because `make` runs ansible from the repo root. Keeps the
# provisioning reproducible: config travels with the repo, not a local shell.
[defaults]
# Silence the repeated "discovered Python interpreter" warning while keeping
# Ansible's smart auto-discovery (both hosts run Debian's system python3).
interpreter_python = auto_silent

# Our own tasks are verified free of deprecated patterns, so the only remaining
# deprecation warnings come from inside the ansible.posix collection modules
# (not our code). Silence that third-party noise for clean output.
# NOTE: this also hides deprecations we might introduce later — rely on
# `ansible-lint` to catch those. Set back to True (or remove) to re-enable.
deprecation_warnings = False
