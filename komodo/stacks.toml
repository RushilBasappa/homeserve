# Stacks — the deployable Compose projects Komodo manages, declared in git
# (research R5; FR-003, FR-004). Each `[[stack]]` maps a name → a target Server
# → a `compose.yaml` under `stacks/<app>/` in THIS repo, which Komodo pulls.
# ResourceSync reconciles the live stacks against this file.
#
# `repo` points at this repository's GitHub remote
# (git@github.com:RushilBasappa/homeserve.git). Komodo pulls the compose over
# https. The repo is PUBLIC, so `git_account` is intentionally omitted — Komodo
# clones anonymously. (Setting a git_account makes Komodo require a token for it,
# which fails on a public repo with no token configured.) If the repo is ever
# made private, add a Komodo git account/token for `RushilBasappa` in Core
# (Settings → Git Accounts) and set `git_account = "RushilBasappa"` here.

[[stack]]
name = "whoami"
description = "Phase-2 orchestration proof — traefik/whoami [git-source-of-truth check 2026-07-19]."
tags = ["phase-2"]

[stack.config]
# Target node: the Mac, to prove per-node placement (deploy here, NOT the Dell).
# Retarget to "ragnaforge-dell" to demonstrate a git-driven change (US2 / T014).
server = "ragnaforge-mac"

# Pull the compose from this git repo (GitHub, public — anonymous clone).
repo = "RushilBasappa/homeserve"
git_provider = "github.com"
branch = "main"
file_paths = ["stacks/whoami/compose.yaml"]

# Deliberate deploys (FR-007): manual by default. Opt into per-stack auto-deploy
# by enabling the webhook (US4 / T020).
webhook_enabled = false
