# Variables — git-declared, NON-SECRET config only (data-model "Variable";
# FR-003, FR-006). Komodo exposes these to resources as `[[VARIABLE_NAME]]`.
#
# SECRETS DO NOT BELONG HERE. Real secret values come from the mise-rendered
# environment and are referenced in compose as `${VAR}` (primary path), or — if
# a value must live in Komodo — as a Komodo *secret* Variable (`is_secret =
# true`), which is redacted on export and seeded once from the mise env, never
# written into this file (research R4 fallback). Everything below is plain
# config that is safe to track in git.

[[variable]]
name = "FLEET_DOMAIN"
description = "Base domain for the fleet (used from Phase 3 for app hostnames)."
value = "ragnaforge.xyz"

[[variable]]
name = "DELL_LAN_IP"
description = "LAN address of ragnaforge-dell (Core + stateful node)."
value = "10.0.0.70"

[[variable]]
name = "MAC_LAN_IP"
description = "LAN address of ragnaforge-mac (stateless compute node)."
value = "10.0.0.71"

# --- Phase 3: Edge, DNS & TLS (research R12) ---

[[variable]]
name = "VPN_HOSTNAME"
description = "Public hostname of the secondary WireGuard VPN (wg-easy WG_HOST); tracked on the current public IP by Cloudflare DDNS, or pointed at the relay VPS on the NO-GO path."
value = "vpn.ragnaforge.xyz"

# --- Phase 5: Media stack — shared non-secret config every media stack reads
# (contract stack-inventory; research R9). All media containers run as this UID/GID
# so files created under /srv/nfs stay mutually readable/writable (Phase-4 setgid
# tree). TZ drives correct schedules/logs across the arr apps and servers.

[[variable]]
name = "MEDIA_PUID"
description = "UID every media container runs as (the rushil account, owner of the /srv/nfs tree). Keeps hardlink-friendly shared ownership across the pipeline."
value = "1000"

[[variable]]
name = "MEDIA_PGID"
description = "GID every media container runs as (matches the setgid /srv/nfs tree from Phase 4)."
value = "1000"

[[variable]]
name = "MEDIA_TZ"
description = "Timezone for all media containers (schedules, logs, Bazarr/Configarr timing). IANA name."
value = "America/Los_Angeles"
