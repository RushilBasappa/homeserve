# Komodo Periphery — the per-node agent (runs on BOTH nodes).
#
# Bootstrapped out-of-band with `make komodo-periphery` on each node (research
# R2, R3). Periphery executes `docker compose` locally on behalf of Core; Core
# connects INBOUND to it on :8120 over the LAN/Tailscale. The same
# `KOMODO_PASSKEY` (from each node's gitignored `.mise.toml`) must match Core's.
#
# Secret forwarding (research R4, the load-bearing decision): stack secrets are
# rendered by mise into THIS agent's process environment and passed through into
# the container below (see WHOAMI_TEST_SECRET). A Periphery-run compose can then
# resolve `${VAR}`. If Periphery does not forward its env into the compose it
# invokes, fall back to a Komodo secret Variable `[[VAR]]` seeded from this env
# (research R4 fallback; validated in T017 / the runbook).

services:
  periphery:
    image: ghcr.io/moghtech/komodo-periphery:2
    labels: [komodo.skip]
    restart: unless-stopped
    ports:
      # Core reaches the agent here over LAN/Tailscale. Not router-forwarded.
      - "8120:8120"
    environment:
      # Passkey Core presents to this agent. Core sends KOMODO_PASSKEY; PERIPHERY
      # reads PERIPHERY_PASSKEYS (NOT KOMODO_PASSKEY — that var is Core-side only).
      # Set both: PERIPHERY_PASSKEYS is the one the agent actually authenticates with
      # (KOMODO_PASSKEY kept only for backward-compat / clarity).
      KOMODO_PASSKEY: ${KOMODO_PASSKEY}
      PERIPHERY_PASSKEYS: ${KOMODO_PASSKEY}
      # Working root for repos Komodo pulls and stack projects it writes.
      PERIPHERY_ROOT_DIRECTORY: /etc/komodo
      # PERSIST the agent's login keypair on the komodo-periphery-root volume
      # (/etc/komodo), NOT the image default /config/keys (ephemeral). Without this,
      # every container RECREATE regenerates the keypair → Core's pinned public key
      # no longer matches → server goes NotOk until the new key is re-accepted
      # (UpdateServerPublicKey). Pinning it here makes recreates non-breaking.
      PERIPHERY_PRIVATE_KEY: file:/etc/komodo/keys/periphery.key
      # --- Stack secrets forwarded from the mise-rendered env (research R4) ---
      # Each secret a Periphery-run stack compose references as ${VAR} MUST be
      # forwarded here so it lands in the agent's process env; the `docker compose`
      # Periphery runs for a stack then inherits it. Non-secret config
      # (hostnames/IPs) is inlined as a literal in the stack compose — Komodo does
      # NOT interpolate [[VAR]] into git-pulled compose content in this setup — so
      # it does NOT belong here either.
      # Present so a Periphery-run compose can resolve ${WHOAMI_TEST_SECRET}.
      WHOAMI_TEST_SECRET: ${WHOAMI_TEST_SECRET}
      # Phase 3 (edge): Traefik DNS-01 + Cloudflare DDNS.
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      # Phase 3 (edge): wg-easy admin bcrypt hash.
      WG_EASY_PASSWORD_HASH: ${WG_EASY_PASSWORD_HASH}
      # --- Phase 5 (media): secrets the arr / jellystat / plex stacks reference as
      # ${VAR}. Forwarded here so a Periphery-run compose resolves them (research R4).
      # Proton WireGuard egress (gluetun) — reused Phase-1 commercial-VPN creds.
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      WIREGUARD_ADDRESSES: ${WIREGUARD_ADDRESSES}
      # Deterministic servarr API keys (the linchpin of declarative wiring).
      RADARR_API_KEY: ${RADARR_API_KEY}
      SONARR_API_KEY: ${SONARR_API_KEY}
      PROWLARR_API_KEY: ${PROWLARR_API_KEY}
      BAZARR_API_KEY: ${BAZARR_API_KEY}
      # qBittorrent human-login password.
      QBIT_WEBUI_PASSWORD: ${QBIT_WEBUI_PASSWORD}
      # P2 (plex) — forwarded now so Periphery isn't recreated again.
      PLEX_CLAIM: ${PLEX_CLAIM}
      # --- Phase 6 (stats): only values a Periphery-run CONTAINER references as
      # ${VAR}. TAUTULLI_API_KEY → the Homepage container's now-playing widget;
      # BESZEL_KEY → the Beszel agents' KEY= (both nodes). PLEX_TOKEN and
      # BESZEL_ADMIN_* are workstation/one-time only and are intentionally NOT here.
      TAUTULLI_API_KEY: ${TAUTULLI_API_KEY}
      BESZEL_KEY: ${BESZEL_KEY}
    volumes:
      # Drive the node's Docker engine.
      - /var/run/docker.sock:/var/run/docker.sock
      # Host stats for the server's health/metrics view (read-only).
      - /proc:/proc:ro
      # Persist pulled repos + stack projects across agent restarts.
      - komodo-periphery-root:/etc/komodo

volumes:
  komodo-periphery-root:
    name: komodo-periphery-root
