# wger — self-hosted workout / fitness / nutrition manager (spec 009; AGPLv3). Dell-only (stateful).
#
# Structure mirrors upstream wger-project/docker's PRODUCTION compose, minus the PowerSync
# mobile-offline-sync service and all optional integrations (out of scope). Six services:
#   web    — Django/Gunicorn :8000 (the app). Migrates + collects static on boot → self-migrates.
#   nginx  — MANDATORY reverse proxy :80. Serves /static + /media from the SHARED volumes and
#            proxies the rest to web:8000. THIS is the service Traefik routes to (routing to
#            web:8000 directly = unstyled site + 404 media). Config is upstream's nginx.conf minus
#            the PowerSync blocks (see the inline `configs:` note at the bottom).
#   celery_worker / celery_beat — same wger image (/start-worker, /start-beat); exercise sync.
#   db     — postgres:15-alpine (service name MUST be `db`; wger defaults its DB host to it).
#   cache  — redis:7-alpine (Django cache /1 + Celery broker/backend /2; MUST be `cache`).
#
# CONFIG: all non-secret env lives in config/prod.env (loaded via `env_file:`, upstream's approach —
# read by the compose CLI, so it's Komodo/git-clone safe, unlike a volume bind). Only the two SECRETS
# are injected via `environment:` from mise (${WGER_SECRET_KEY}, ${WGER_POSTGRES_PASSWORD}).
#
# LAN/VPN-ONLY (FR-013, SC-008): Traefik on `nginx`; db/cache internal-only, NO host ports, NO forward.
# GOLDEN RULE: all volumes Dell-local; nothing on /srv/nfs or the Mac.
# REGISTRATION: closed (config/prod.env ALLOW_REGISTRATION=False) — wger bootstraps an `admin` account
#   on first boot (admin/adminadmin) → CHANGE ITS PASSWORD IMMEDIATELY (runbook step 1).
# IMAGE TAGS — VERIFY/BUMP at deploy; re-sync config/prod.env against that release's upstream prod.env.
#   https://github.com/wger-project/docker  •  https://hub.docker.com/r/wger/server/tags
#
# The Celery-beat schedule is regenerable state (rebuilt on start) and is intentionally NOT volumed
# (avoids an unverified mount path) — add one at the verified beat path if persistence is wanted.

# --- Shared config for the three app services (web + celery worker + beat) --------------------
x-wger-app: &wger-app
  image: docker.io/wger/server:2.6.0   # VERIFY/BUMP at deploy — never :latest
  restart: unless-stopped
  env_file:
    - config/prod.env
  environment:
    # The only two secrets — injected from mise (Periphery env). Everything else is in prod.env.
    SECRET_KEY: ${WGER_SECRET_KEY}
    POSTGRES_PASSWORD: ${WGER_POSTGRES_PASSWORD}
  networks:
    - wger

services:
  # --- Django app (self-migrates on boot; NOT routed directly) -----------------------------
  web:
    <<: *wger-app
    container_name: wger-web
    volumes:
      # web WRITES here (collectstatic output + uploads); nginx reads the same volumes (below).
      - wger-static:/home/wger/static
      - wger-media:/home/wger/media
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s   # covers cold-boot migrate + collectstatic

  # --- nginx (MANDATORY: serves static/media, proxies to web; the ROUTED service) ----------
  nginx:
    image: docker.io/nginx:stable
    container_name: wger-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    volumes:
      # Read-only view of the SAME volumes web populates (paths per upstream nginx.conf aliases).
      - wger-static:/wger/static:ro
      - wger-media:/wger/media:ro
    configs:
      - source: wger-nginx
        target: /etc/nginx/conf.d/default.conf
    networks:
      - wger
      - traefik
    healthcheck:
      test: ["CMD", "service", "nginx", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      # --- canonical Traefik routing labels; route to NGINX (:80), never web:8000 ---
      - "traefik.enable=true"
      - "traefik.http.routers.wger.rule=Host(`wger.ragnaforge.xyz`)"
      - "traefik.http.routers.wger.entrypoints=websecure"
      - "traefik.http.routers.wger.tls=true"
      - "traefik.http.services.wger.loadbalancer.server.port=80"

  # --- Celery worker (background jobs; no route; best-effort) -------------------------------
  celery_worker:
    <<: *wger-app
    container_name: wger-celery-worker
    command: ["/start-worker"]
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "wger", "inspect", "ping"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s

  # --- Celery beat (scheduler; no route) ---------------------------------------------------
  celery_beat:
    <<: *wger-app
    container_name: wger-celery-beat
    command: ["/start-beat"]
    depends_on:
      celery_worker:
        condition: service_healthy

  # --- PostgreSQL (the durable state) ------------------------------------------------------
  db:
    image: docker.io/postgres:15-alpine
    container_name: wger-db
    restart: unless-stopped
    env_file:
      - config/prod.env       # POSTGRES_USER / POSTGRES_DB / TZ
    environment:
      POSTGRES_PASSWORD: ${WGER_POSTGRES_PASSWORD}
    volumes:
      - wger-pgdata:/var/lib/postgresql/data
    networks:
      - wger
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- Redis (Django cache + Celery broker/backend) ----------------------------------------
  cache:
    image: docker.io/redis:7-alpine
    container_name: wger-cache
    restart: unless-stopped
    volumes:
      - wger-redis:/data
    networks:
      - wger
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

configs:
  # Upstream config/nginx.conf, with ONLY the two PowerSync blocks removed (the `upstream powersync`
  # and `location /ps/` — we don't run PowerSync, and nginx refuses to start with an unresolvable
  # upstream). Shipped inline (content:) NOT as `configs: file:` because that bind-mounts and Komodo's
  # git-clone deploy can't resolve a relative bind ([[homeserve-inline-configs-need-recreate]]) —
  # so EDITING this block needs a container RECREATE, not just a redeploy. `$$` escapes compose
  # interpolation so nginx sees a literal `$`.
  wger-nginx:
    content: |
      upstream wger {
          server web:8000;
      }

      map $$http_x_forwarded_proto $$final_forwarded_proto {
          default $$http_x_forwarded_proto;
          ''      $$scheme;
      }

      server {
          listen 80;
          access_log /dev/stdout;

          location / {
              proxy_pass http://wger;
              proxy_set_header Host $$http_host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$final_forwarded_proto;
              proxy_set_header X-Forwarded-Host $$http_host;
              proxy_set_header Upgrade $$http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_redirect off;
              proxy_http_version 1.1;
              proxy_read_timeout 86400s;
              proxy_send_timeout 86400s;
          }

          location /static/ {
              alias /wger/static/;
              add_header Cache-Control "public, max-age=31536000, immutable" always;
              add_header Vary "Accept-Encoding" always;
          }

          location /media/ {
              alias /wger/media/;
          }

          client_max_body_size 100M;
      }

volumes:
  # All Dell-local named volumes (golden rule). Nothing on /srv/nfs or the Mac.
  wger-static:    # collectstatic output (web writes) / served by nginx — regenerable
  wger-media:     # user uploads — IRREPLACEABLE (Phase-10 backup candidate)
  wger-pgdata:    # PostgreSQL — the durable state — IRREPLACEABLE
  wger-redis:     # cache + Celery queue — ephemeral

networks:
  # Internal — web/celery/db/cache reachable only within the stack; never published.
  wger:
  # Shared external proxy network — only `nginx` attaches for its route.
  traefik:
    external: true
