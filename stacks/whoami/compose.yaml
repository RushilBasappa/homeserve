# whoami — the Phase-2 orchestration proof, RELABELED in Phase 3 as the
# end-to-end edge proof (research R8, R1).
#
# The smallest thing that exercises "deploy to a chosen node from Core alone":
# a trivial STATELESS HTTP echo (traefik/whoami). No host ports, no volumes, no
# state. In Phase 3 it gains the canonical Traefik routing labels so it becomes
# reachable at https://whoami.ragnaforge.xyz under the shared wildcard cert —
# proving US1 (reach an app by HTTPS name) and US2 (publish-by-labels only).
# This is NOT a real app; real services arrive in Phases 5–6. Per tasks.md T041,
# keep it as the Phase-3 proof until a real app lands, then remove it.
#
# NOTE: this stack must be RETARGETED to `ragnaforge-dell` in komodo/stacks.toml
# for the edge labels to work — Traefik and the `traefik` network live on the Dell
# (research R10). (Phase 2 deliberately targeted the Mac to prove per-node
# placement; Phase 3 pins it to the Dell alongside the edge.)

services:
  whoami:
    image: traefik/whoami:latest
    container_name: whoami
    restart: unless-stopped
    # No host `ports:` — reached only via Traefik on the shared network (the
    # "no host ports for HTTP apps" rule, docs/CONVENTIONS.md). No volumes — the
    # stack holds no state.
    networks:
      - traefik
    labels:
      - "phase2.manual_default=applied-on-trigger"
      # --- Phase 3: canonical Traefik routing labels (contract edge-routing) ---
      # Router/service name == stack name; the app only opts in + sets tls=true —
      # it reuses the wildcard *.ragnaforge.xyz, requests no cert of its own.
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.ragnaforge.xyz`)"
      - "traefik.http.routers.whoami.entrypoints=websecure"
      - "traefik.http.routers.whoami.tls=true"
      # traefik/whoami listens on 80 internally (its container port, not a host port).
      - "traefik.http.services.whoami.loadbalancer.server.port=80"
    environment:
      # Secret-injection proof (US3, research R4): a throwaway secret rendered by
      # mise into the Periphery process env and referenced here as ${VAR} — never
      # a literal value. Verify it lands with:
      #   docker exec whoami env | grep WHOAMI_TEST_SECRET
      # If the Periphery-run compose does not resolve this from the agent's env,
      # switch to the Komodo secret-Variable `[[WHOAMI_TEST_SECRET]]` fallback
      # (research R4; decided in T017 / the runbook).
      WHOAMI_TEST_SECRET: ${WHOAMI_TEST_SECRET}

networks:
  # The shared external proxy network created once on the Dell (research R10).
  traefik:
    external: true
