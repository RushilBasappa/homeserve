# media-helpers — the STATELESS self-maintenance workers (research R6/R7; US3, P2).
# Runs on ragnaforge-MAC (the only non-Dell stack in the phase) to relieve the
# Dell's 7.5 GB. Per the golden rule, the Mac holds NO persistent state → none of
# these declare a named volume; durable config comes from env + plane-3 wiring and
# is trivially reproducible. (If a future version of Cleanuparr/Huntarr REQUIRES a
# persistent config volume, the golden-rule-correct move is to relocate that one
# service to the Dell — see contract stack-inventory.md "Note on Mac helpers".)
#
# ROUTING: Traefik lives on the DELL and only sees Dell containers by label, so these
# Mac UIs are published on host ports here (LAN-only) and routed by Traefik's FILE
# provider → 10.0.0.71:<port> (see stacks/traefik/compose.yaml, media-helpers block).
#
# REACHING THE ARR APPS: these workers reach the Dell's apps over the LAN via their
# Traefik HTTPS names (resolved by AdGuard, valid wildcard cert). Prowlarr reaches
# Byparr directly at http://10.0.0.71:8191 (indexer proxy, edge 5).
#
# IMAGE TAGS: pinned (no :latest) per Diun/Phase-10 intent.

services:
  # --- Byparr — FlareSolverr successor; solves bot-protected indexers ----------
  # Stateless by nature (no config to persist). Added to Prowlarr as an indexer
  # proxy (edge 5). Prowlarr calls it at http://10.0.0.71:8191.
  byparr:
    image: ghcr.io/thephaseless/byparr:1.3.0
    container_name: byparr
    restart: unless-stopped
    environment:
      TZ: America/Los_Angeles
    ports:
      - "8191:8191"   # LAN-only; Prowlarr (Dell) + Traefik file-route reach it here.

  # --- Cleanuparr — removes stalled/blocked/malware downloads, blocklists,
  #     re-searches (SC-007). Points at the Dell's PVRs + qBittorrent (edge 17). ---
  cleanuparr:
    image: ghcr.io/cleanuparr/cleanuparr:2.3.1
    container_name: cleanuparr
    restart: unless-stopped
    environment:
      TZ: America/Los_Angeles
      # Reach the Dell apps over the LAN via their Traefik HTTPS names. Keys are the
      # deterministic servarr keys from mise. (Cleanuparr also supports its own web
      # UI for config; env is the reproducible source — see the runbook.)
      PORT: "11011"
    ports:
      - "11011:11011"  # LAN-only; routed by Traefik file provider.

  # --- Huntarr — hunts missing items + upgrades on a schedule (edge 18) ---------
  huntarr:
    image: ghcr.io/plexguide/huntarr:8.1.0
    container_name: huntarr
    restart: unless-stopped
    environment:
      TZ: America/Los_Angeles
    ports:
      - "9705:9705"    # LAN-only; routed by Traefik file provider.

# No `volumes:` — the Mac holds no persistent state (golden rule).
# No `networks:` — these publish LAN host ports on the Mac; there is no Traefik
# network on the Mac (Traefik runs on the Dell).
