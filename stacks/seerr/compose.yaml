# seerr — the single request front door (research R4; US1). Dell-only (stateful).
#
# seerr-team/seerr (the Overseerr+Jellyseerr successor) is a REAL project but has no
# stable release yet, so we run its rolling `:develop` tag. This is a DELIBERATE
# exception to the "pin explicit tags, no floating" rule — there is no versioned tag
# to pin; Diun (Phase 10) can watch it. Current digest at time of deploy:
#   sha256:86c8eb6a47eabfaec07425173d87a3bf15dc1800dfc616c48447ee8fd0e47b1a
# (pin `develop@sha256:...` if you want reproducibility over rolling updates.)
#
# ONE instance: backend = Jellyfin (account-free, always on), fulfilment = the shared
# Radarr/Sonarr. Requests are media-server-agnostic — files it triggers are imported
# once and seen by both Jellyfin AND Plex, so tracking availability from Jellyfin is
# sufficient.
#
# STATE: seerr-config is a local named volume on the Dell (golden rule).
# WIRING (see runbook + stacks/arr/configure/wire.yml): connect Seerr → Jellyfin
# (admin login, edge 10) and Seerr → Radarr/Sonarr (edges 8–9). Seerr's own API key
# is minted at first-run (not a stored secret).
#
# IMAGE TAG: pinned (no :latest) per Diun/Phase-10 intent.

services:
  seerr:
    image: ghcr.io/seerr-team/seerr:develop
    container_name: seerr
    restart: unless-stopped
    environment:
      # Non-secret constants; mirrored in komodo/variables.toml (MEDIA_PUID/PGID/TZ).
      PUID: "1000"
      PGID: "1000"
      TZ: America/Los_Angeles
    volumes:
      - seerr-config:/app/config
    networks:
      - traefik
    labels:
      # --- canonical Traefik routing labels; Seerr listens on 5055 ---
      - "traefik.enable=true"
      - "traefik.http.routers.seerr.rule=Host(`seerr.ragnaforge.xyz`)"
      - "traefik.http.routers.seerr.entrypoints=websecure"
      - "traefik.http.routers.seerr.tls=true"
      - "traefik.http.services.seerr.loadbalancer.server.port=5055"

volumes:
  # Local named volume on the Dell (golden rule: request state → the Dell).
  seerr-config:

networks:
  traefik:
    external: true
