# traefik — the edge reverse proxy + wildcard-TLS terminator (research R1, R2, R10).
#
# Terminates HTTPS on :443, Host-routes `<app>.ragnaforge.xyz` to the right
# container by Docker label, and redirects :80 → :443 globally. Obtains and
# renews ONE Let's Encrypt wildcard cert (*.ragnaforge.xyz) via Cloudflare DNS-01
# and reuses it for every router — apps carry only routing labels + `tls=true`,
# never their own cert (see docs/CONVENTIONS.md → "Traefik routing labels").
#
# Two kinds of config, both shipped WITHOUT a host bind mount (Komodo deploys from
# a git clone where relative bind mounts don't reliably resolve):
#   - STATIC config → CLI flags in `command:`.
#   - DYNAMIC config (the wildcard default cert) → an inline `configs:` block whose
#     `content:` is materialised inside the container at /dynamic/tls.yaml and
#     loaded via the file provider. `defaultGeneratedCert` makes Traefik obtain the
#     wildcard PROACTIVELY at startup and serve it as the default for every
#     tls=true router (an entrypoint-level tls.domains does NOT trigger issuance).
#
# State: acme.json (cert + key + renewal metadata) on the Dell volume
# `traefik-acme`, mounted at /acme; Traefik writes it 0600 and REUSES it across
# restarts (no re-issuance — FR-007, SC-007).

configs:
  traefik-dynamic:
    # The one wildcard, generated once and reused by all routers (FR-005, SC-003).
    content: |
      tls:
        stores:
          default:
            defaultGeneratedCert:
              resolver: letsencrypt
              domain:
                main: "ragnaforge.xyz"
                sans:
                  - "*.ragnaforge.xyz"
# traefik-media-helpers file-routes (byparr/cleanuparr/huntarr) REMOVED 2026-07-20 —
# the media-helpers Mac stack was deleted. Re-add a file config here if it ever returns.

services:
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    # The one HTTP front door. 80/443 are the only host ports the edge publishes
    # for apps; everything downstream is reached over the `traefik` network.
    ports:
      - "80:80"
      - "443:443"
    environment:
      # DNS-01 credential — the EXISTING Cloudflare token, reused (research R12).
      # Referenced as ${VAR}; the real value lives only in the gitignored
      # .mise.toml and is forwarded via the Periphery agent env (FR-014, SC-009).
      CF_DNS_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    command:
      - "--global.checknewversion=false"
      - "--global.sendanonymoususage=false"
      - "--log.level=INFO"
      # entryPoint :80 — global HTTP→HTTPS redirect, configured once (FR-004).
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      # Docker label discovery; nothing routed unless it opts in (FR-002).
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik"
      # File provider → the inline dynamic config (the wildcard default cert).
      - "--providers.file.directory=/dynamic"
      - "--providers.file.watch=true"
      # ACME: Let's Encrypt wildcard via Cloudflare DNS-01 — no inbound port
      # needed, lifetime-agnostic renewal (no duration/profile pinned) (R2).
      - "--certificatesresolvers.letsencrypt.acme.email=rushil.basappa@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,9.9.9.9:53"
    configs:
      - source: traefik-dynamic
        target: /dynamic/tls.yaml
    volumes:
      # Read-only Docker socket for label discovery (routes come from containers).
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Persisted cert store on the Dell — the only TLS state in the whole edge.
      - traefik-acme:/acme
    networks:
      - traefik

volumes:
  # Local named volume on the Dell (golden rule: state → the Dell). Holds
  # acme.json; survives restarts so the wildcard is never needlessly re-issued.
  traefik-acme:

networks:
  # The shared external proxy network, created ONCE on the Dell (`make
  # edge-network`; research R10). Traefik and every HTTP app join it.
  traefik:
    external: true
