# Traefik v3 STATIC configuration (research R1, R2).
#
# Mounted read-only at /etc/traefik/traefik.yaml.
#
# Design notes:
#  - Global HTTP→HTTPS redirect is configured ONCE on the `web` entryPoint, never
#    per app (FR-004).
#  - The shared wildcard *.ragnaforge.xyz is applied ONCE on the `websecure`
#    entryPoint, so every router only needs `tls=true` — no per-app certresolver
#    or domains labels (matches docs/CONVENTIONS.md).
#  - DNS-01 needs NO inbound port and is the only way to get a wildcard (R2).
#  - Renewal is LIFETIME-AGNOSTIC: no certificatesDuration / profile pinned, so
#    Let's Encrypt's 45-day (2026) / 64-day (2027) shifts need no change (R2).

global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO

entryPoints:
  web:
    address: ":80"
    http:
      # Everything on :80 is 308-redirected to HTTPS (FR-004, SC-006).
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
        # Request/serve the wildcard once; every router on this entryPoint reuses
        # it. `main` covers the apex, `sans` the subdomains (FR-005, SC-003).
        domains:
          - main: "ragnaforge.xyz"
            sans:
              - "*.ragnaforge.xyz"

providers:
  docker:
    # Discover routes from container labels. Nothing is routed unless it opts in
    # with `traefik.enable=true` (FR-002).
    exposedByDefault: false
    network: traefik

certificatesResolvers:
  letsencrypt:
    acme:
      # ACME account email for expiry notices (non-secret; already present in git
      # commit metadata). Inlined here to keep the critical cert path free of any
      # interpolation dependency.
      email: "rushil.basappa@gmail.com"
      # Persisted on the traefik-acme volume; Traefik writes it 0600 and reuses it
      # across restarts (FR-007, SC-007).
      storage: /acme/acme.json
      dnsChallenge:
        provider: cloudflare
        # Check the _acme-challenge TXT against public resolvers to avoid a stale
        # internal-resolver answer during validation.
        resolvers:
          - "1.1.1.1:53"
          - "9.9.9.9:53"
