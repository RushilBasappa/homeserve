# homepage — the dashboard front door at home.ragnaforge.xyz (research R5).
#
# One memorable place listing every app with HTTPS links (FR-012, US5). Routed
# like any other app via the canonical Traefik labels; reuses the wildcard cert.
#
# Config is shipped INLINE via `configs:` content (materialised inside the
# container at /app/config/*.yaml) — NOT a host bind mount, because Komodo deploys
# from a git clone where a relative `./config` mount doesn't resolve (Docker would
# create an empty dir). This keeps the front door git-declared and Komodo-safe.
# The former stacks/homepage/config/*.yaml files are superseded by these blocks.

configs:
  homepage-settings:
    content: |
      title: Ragnaforge
      headerStyle: clean
      theme: dark
      color: slate
      layout:
        Infrastructure:
          style: row
          columns: 3
        Apps:
          style: row
          columns: 4
        Media:
          style: row
          columns: 4
        Acquisition:
          style: row
          columns: 4
  homepage-services:
    content: |
      - Infrastructure:
          - Komodo:
              icon: komodo.png
              href: https://komodo.ragnaforge.xyz
              description: Fleet orchestration (Core) — LAN/Tailscale only
          - AdGuard Home:
              icon: adguard-home.png
              href: https://adguard.ragnaforge.xyz
              description: Internal DNS + ad-blocking — LAN/Tailscale only
          - wg-easy:
              icon: wireguard.png
              href: https://wg.ragnaforge.xyz
              description: Family/friends VPN admin — LAN/Tailscale only
      - Apps:
          - whoami:
              icon: traefik.png
              href: https://whoami.ragnaforge.xyz
              description: Phase-3 edge proof (traefik/whoami)
      - Media:
          - Jellyfin:
              icon: jellyfin.png
              href: https://jellyfin.ragnaforge.xyz
              description: Primary media server (QuickSync)
          - Plex:
              icon: plex.png
              href: https://plex.ragnaforge.xyz
              description: Second media server (P2, RAM-gated)
          - Seerr:
              icon: overseerr.png
              href: https://seerr.ragnaforge.xyz
              description: Request front door (backend = Jellyfin)
          - Maintainerr:
              icon: maintainerr.png
              href: https://maintainerr.ragnaforge.xyz
              description: Manual six-surface cascade delete
          - Jellystat:
              icon: jellyfin.png
              href: https://jellystat.ragnaforge.xyz
              description: Jellyfin watch statistics (P2)
      - Acquisition:
          - qBittorrent:
              icon: qbittorrent.png
              href: https://qbittorrent.ragnaforge.xyz
              description: Download client (behind Proton/Gluetun)
          - Prowlarr:
              icon: prowlarr.png
              href: https://prowlarr.ragnaforge.xyz
              description: Indexer manager (native app-sync)
          - Radarr:
              icon: radarr.png
              href: https://radarr.ragnaforge.xyz
              description: Movie PVR
          - Sonarr:
              icon: sonarr.png
              href: https://sonarr.ragnaforge.xyz
              description: TV PVR
          - Bazarr:
              icon: bazarr.png
              href: https://bazarr.ragnaforge.xyz
              description: Subtitles
          - Byparr:
              icon: flaresolverr.png
              href: https://byparr.ragnaforge.xyz
              description: Bot-protection proxy (Mac, stateless)
          - Cleanuparr:
              icon: cleanuparr.png
              href: https://cleanuparr.ragnaforge.xyz
              description: Queue cleanup (Mac, stateless)
          - Huntarr:
              icon: huntarr.png
              href: https://huntarr.ragnaforge.xyz
              description: Missing/upgrade hunter (Mac, stateless)
  homepage-widgets:
    content: |
      - resources:
          cpu: true
          memory: true
          disk: /
      - search:
          provider: duckduckgo
          target: _blank
  homepage-bookmarks:
    content: |
      - Project:
          - Repo:
              - abbr: GH
                href: https://github.com/RushilBasappa/homeserve
          - Homepage docs:
              - abbr: HP
                href: https://gethomepage.dev/

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    # No host `ports:` — reached only via Traefik (HTTP app rule).
    networks:
      - traefik
    environment:
      # Homepage rejects requests whose Host header isn't allow-listed; it is
      # served at home.ragnaforge.xyz behind Traefik.
      HOMEPAGE_ALLOWED_HOSTS: home.ragnaforge.xyz
    configs:
      - source: homepage-settings
        target: /app/config/settings.yaml
      - source: homepage-services
        target: /app/config/services.yaml
      - source: homepage-widgets
        target: /app/config/widgets.yaml
      - source: homepage-bookmarks
        target: /app/config/bookmarks.yaml
    labels:
      # --- canonical Traefik routing labels (contract edge-routing) ---
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`home.ragnaforge.xyz`)"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.tls=true"
      # Homepage listens on 3000 internally.
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"

networks:
  traefik:
    external: true
