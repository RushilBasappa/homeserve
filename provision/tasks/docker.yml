# tasks/docker.yml — install Docker Engine from Docker's official apt repository.
#
# The upstream repo is the supported, transparent path — no convenience script
# (not idempotent) and no third-party Galaxy role that could silently drift
# (research.md R3). The compose plugin is included because every later phase is
# Compose-based.
---
- name: Install prerequisites for the Docker apt repository
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: true

- name: Create the apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker's official GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add the Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Install Docker Engine, CLI, containerd, and the compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Enable and start the Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Add the admin user to the docker group
  ansible.builtin.user:
    name: "{{ admin_user }}"
    groups: docker
    append: true
