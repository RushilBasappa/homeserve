# tasks/tailscale.yml — install Tailscale from its official apt repo and enroll
# the node idempotently.
#
# A freshly installed OS has no Tailscale, so we must (re)install and enroll —
# but `tailscale up` runs ONLY when `tailscale status` shows the node is not
# already connected, which keeps the task idempotent and avoids re-authenticating
# a healthy node (research.md R7). The auth key is a real secret, read from the
# environment via `mise` — never from a tracked file (research.md R8).
---
- name: Add Tailscale's official GPG key
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/debian/{{ ansible_facts['distribution_release'] }}.noarmor.gpg"
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: "0644"

- name: Add the Tailscale apt repository
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/debian/{{ ansible_facts['distribution_release'] }}.tailscale-keyring.list"
    dest: /etc/apt/sources.list.d/tailscale.list
    mode: "0644"

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true

- name: Enable and start the tailscaled service
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Check whether the node is already connected to the tailnet
  ansible.builtin.command: tailscale status
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Enroll the node into the tailnet (only when not already connected)
  ansible.builtin.command: >-
    tailscale up --authkey "{{ lookup('env', 'TAILSCALE_AUTHKEY') }}"
  when: tailscale_status.rc != 0 or 'Logged out' in tailscale_status.stdout
  register: tailscale_up
  changed_when: tailscale_up.rc == 0
  no_log: true

# Enforce accept-routes. Nodes here are physically ON the advertised LAN, so they
# must NOT accept the subnet route for it — doing so black-holes their own inbound
# LAN traffic (see the tailscale_accept_routes rationale in group_vars/all.yml).
- name: Read current Tailscale accept-routes (RouteAll) preference
  ansible.builtin.command: tailscale debug prefs
  register: tailscale_prefs
  changed_when: false

- name: Enforce the Tailscale accept-routes preference
  ansible.builtin.command: >-
    tailscale set --accept-routes={{ tailscale_accept_routes | bool | string | lower }}
  when: >-
    ('"RouteAll": ' ~ (tailscale_accept_routes | bool | string | lower))
    not in tailscale_prefs.stdout
  register: tailscale_set_routes
  changed_when: tailscale_set_routes.rc == 0
