# tasks/nfs-server.yml — the Dell exports the shared media/config namespace.
#
# Exports /srv/nfs to the Mac's specific LAN IP (least-privilege — not the whole
# /24) with sane options, then re-applies the export table (research.md R4).
---
- name: Install the NFS kernel server
  ansible.builtin.apt:
    name: nfs-kernel-server
    state: present
    update_cache: true

- name: Ensure the export directory exists and is writable by the admin user
  ansible.builtin.file:
    path: "{{ nfs_export_path }}"
    state: directory
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0775"

- name: Export the shared path to the NFS client
  ansible.builtin.lineinfile:
    path: /etc/exports
    regexp: "^{{ nfs_export_path }}\\s"
    line: "{{ nfs_export_path }} {{ nfs_client_ip }}({{ nfs_export_options }})"
    create: true
    mode: "0644"
  notify: Reapply NFS exports

- name: Enable and start the NFS server
  ansible.builtin.systemd:
    name: nfs-server
    enabled: true
    state: started
