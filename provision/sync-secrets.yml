# sync-secrets.yml — push the repo's .mise.toml to every node, in sync.
#
# The workstation's gitignored `.mise.toml` is the single source of truth for
# secrets. This playbook copies it verbatim (exact copy) to `~/homeserve/.mise.toml`
# on each node so a stack's `${VAR}` references resolve from the node's mise env.
# Run it whenever you edit `.mise.toml`:
#
#     make sync-secrets
#
# Idempotent: a node is only touched when the file content actually differs. When
# it changes, mise is re-trusted (a new file invalidates the old trust hash) and
# Periphery is recreated so the agent's process env picks up the new values — then
# redeploy any affected stack from Komodo (deploys stay deliberate).
#
# No `become`: the file lives in the operator's own home and Periphery runs as the
# operator (in the `docker` group), so nothing here needs root. Secret-free tree:
# the real values live only in the gitignored `.mise.toml`, never in this repo.
---
- name: Sync the mise secrets file to every node
  hosts: docker_hosts
  become: false
  gather_facts: false
  vars:
    homeserve_dir: "/home/{{ admin_user }}/homeserve"
    mise_bin: "/home/{{ admin_user }}/.local/bin/mise"
  tasks:
    - name: Copy the workstation .mise.toml to the node (exact copy, 0600)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../.mise.toml"
        dest: "{{ homeserve_dir }}/.mise.toml"
        mode: "0600"
      register: mise_copy

    - name: Re-trust mise and refresh Periphery so new secrets take effect
      ansible.builtin.shell:
        chdir: "{{ homeserve_dir }}"
        cmd: |
          {{ mise_bin }} trust
          {{ mise_bin }} exec -- docker compose -f komodo/bootstrap/periphery.compose.yaml up -d
      environment:
        PATH: "/home/{{ admin_user }}/.local/bin:/usr/local/bin:/usr/bin:/bin"
      when: mise_copy is changed
      changed_when: true
